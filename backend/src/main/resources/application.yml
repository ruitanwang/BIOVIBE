server:
  port: 3001

spring:
  application:
    name: biovibe-backend

  datasource:
    url: jdbc:h2:file:./data/biovibe;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

biovibe:
  upload:
    dir: uploads
  jwt:
    secret: BioVibe2026SecretKeyForJwtTokenGenerationAndValidationMustBeLongEnough
    expiration: 86400000

logging:
  level:
    com.biovibe: debug
    org.springframework.web: info
